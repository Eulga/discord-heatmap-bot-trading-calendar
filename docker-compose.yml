services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-heatmap-bot
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./data/heatmaps:/app/data/heatmaps
      - ./data/state:/app/data/state
      - ./data/logs:/app/data/logs

  postgres:
    image: postgres:16-alpine
    container_name: discord-heatmap-postgres
    environment:
      POSTGRES_DB: discord_heatmap
      POSTGRES_USER: discord_heatmap
      POSTGRES_PASSWORD: discord_heatmap
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-heatmap-bot-dev
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./data/heatmaps:/app/data/heatmaps
      - ./data/state:/app/data/state
      - ./data/logs:/app/data/logs

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: discord_heatmap
      POSTGRES_USER: discord_heatmap
      POSTGRES_PASSWORD: discord_heatmap
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    command: ["postgres", "-c", "timezone=Asia/Seoul"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discord_heatmap -d discord_heatmap"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

volumes:
  postgres-data:

interface:
  display_name: "Repo PR Review"
  short_description: "Review for bugs, regressions, docs drift, and missing tests"
  default_prompt: "Use $pr-review to review the current local diff or PR against this repository's review rules. Focus on correctness, scheduler truthfulness, state safety, docs drift, and missing tests. Report findings first."
policy:
  allow_implicit_invocation: true

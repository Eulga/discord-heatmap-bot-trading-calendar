interface:
  display_name: "Check PR Review"
  short_description: "Check PR review, fix, push, rerequest"
  default_prompt: "Use $check-pr-review to inspect the current branch's GitHub PR review state with thread-aware data. Treat the PR as clean only when required checks are green and the current PR head has a completed Codex review. If the latest completed review is stale, request one fresh @codex review when needed and report Pending. If not clean, inspect actionable findings, implement the smallest safe fix, run relevant scripts/run_repo_checks.py validation, commit only the review-fix files, push the branch, and request a fresh Codex review without waiting."
policy:
  allow_implicit_invocation: true
